<!doctype html>

    <!-- ============================================================
         TITLE & META — seo-onpage skill applied
         Primary query near the front, brand at end, 55 chars
    ============================================================ -->
    <title>NyumbaniKisii — Kisii University Student Hostel & Accommodation Portal</title>
    <meta name="description" content="Find and book verified student hostels near Kisii University. Compare rooms in Nyanchwa, Mwembe, Jogoo & more. Features Wi-Fi, borehole water, hot showers & instant booking." />

    <meta name="author" content="NyumbaniKisii Student Accommodations" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL — seo-technical skill: one URL per piece of content -->
    <link rel="canonical" href="https://nyumbanikisii.co.ke/" />

    <!-- Sitemap reference — seo-technical skill: crawlability -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
